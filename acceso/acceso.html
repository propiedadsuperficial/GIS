<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acceso | GIS Pucobre</title>
  <meta name="robots" content="noindex,nofollow" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0b0c10;
      color: #e6edf3;
    }

    .card {
      width: min(480px, 92vw);
      background: #151a24;
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,.5);
      border: 1px solid #21262d;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .logo-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #27ae60;
    }

    .logo span {
      font-weight: 700;
      font-size: 1.1rem;
      color: #e6edf3;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #8b949e;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    #ctx-pill {
      display: inline-block;
      background: #1c2330;
      color: #58a6ff;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-family: monospace;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 6px;
    }

    input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #2b3445;
      background: #0f1420;
      color: #e6edf3;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="email"]:focus {
      border-color: #27ae60;
    }

    button[type="submit"] {
      margin-top: 14px;
      padding: 13px;
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: #27ae60;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover:not(:disabled) { opacity: 0.9; }
    button[type="submit"]:active:not(:disabled) { transform: translateY(1px); }

    button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      font-size: 0.875rem;
      min-height: 20px;
      line-height: 1.5;
    }

    .ok   { color: #3fb950; }
    .warn { color: #d29922; }
    .err  { color: #f85149; }

    .footer-note {
      margin-top: 24px;
      font-size: 0.78rem;
      color: #4b5563;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <span>GIS Pucobre</span>
    </div>

    <h1>Acceso al sistema</h1>
    <p class="subtitle">
      Recibirás un enlace de acceso en tu correo.<br>
      No necesitas contraseña.
    </p>

    <div id="ctx-pill">cargando parámetros…</div>

    <form id="form-acceso">
      <label for="email">Correo corporativo</label>
      <input
        id="email"
        type="email"
        placeholder="usuario@pucobre.cl"
        required
        autocomplete="email"
      />

      <button id="btn-enviar" type="submit">Enviar enlace de acceso</button>
      <div id="status" class="status"></div>
    </form>

    <p class="footer-note">
      Solo personal autorizado · Acceso restringido
    </p>
  </main>

  <script type="module" src="../js/acceso.js"></script>
</body>
</html>
